name: CI/CD Inovatech EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPO_FRONTEND: tienda-fronted
  ECR_REPO_VENTAS: tienda-ventas
  ECR_REPO_DESPACHOS: tienda-despachos
  ECR_REPO_DB: tienda-db
  EKS_NAMESPACE: inovatech

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set variables
        run: |
          echo "REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # =========================
      # BUILD IMAGES
      # =========================

      - name: Build DB
        run: |
          cd db
          docker build -t $REGISTRY/$ECR_REPO_DB:$IMAGE_TAG .
          docker tag $REGISTRY/$ECR_REPO_DB:$IMAGE_TAG $REGISTRY/$ECR_REPO_DB:latest

      - name: Build FRONTEND
        run: |
          cd front_despacho
          docker build -t $REGISTRY/$ECR_REPO_FRONTEND:$IMAGE_TAG .
          docker tag $REGISTRY/$ECR_REPO_FRONTEND:$IMAGE_TAG $REGISTRY/$ECR_REPO_FRONTEND:latest

      - name: Build VENTAS
        run: |
          cd back-Ventas_SpringBoot/Springboot-API-REST
          docker build -t $REGISTRY/$ECR_REPO_VENTAS:$IMAGE_TAG .
          docker tag $REGISTRY/$ECR_REPO_VENTAS:$IMAGE_TAG $REGISTRY/$ECR_REPO_VENTAS:latest

      - name: Build DESPACHOS
        run: |
          cd back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker build -t $REGISTRY/$ECR_REPO_DESPACHOS:$IMAGE_TAG .
          docker tag $REGISTRY/$ECR_REPO_DESPACHOS:$IMAGE_TAG $REGISTRY/$ECR_REPO_DESPACHOS:latest

      # =========================
      # PUSH ECR
      # =========================

      - name: Push images
        run: |
          docker push $REGISTRY/$ECR_REPO_DB:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPO_DB:latest

          docker push $REGISTRY/$ECR_REPO_FRONTEND:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPO_FRONTEND:latest

          docker push $REGISTRY/$ECR_REPO_VENTAS:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPO_VENTAS:latest

          docker push $REGISTRY/$ECR_REPO_DESPACHOS:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPO_DESPACHOS:latest

      # =========================
      # KUBECTL
      # =========================

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configure EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      # =========================
      # DEPLOY EKS
      # =========================

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/ -n $EKS_NAMESPACE

          kubectl set image deployment/ventas \
            ventas=$REGISTRY/$ECR_REPO_VENTAS:$IMAGE_TAG \
            -n $EKS_NAMESPACE

          kubectl set image deployment/despachos \
            despachos=$REGISTRY/$ECR_REPO_DESPACHOS:$IMAGE_TAG \
            -n $EKS_NAMESPACE

          kubectl set image deployment/frontend \
            frontend=$REGISTRY/$ECR_REPO_FRONTEND:$IMAGE_TAG \
            -n $EKS_NAMESPACE

      # =========================
      # ESPERAR ROLLOUTS
      # =========================

      - name: Esperar rollouts
        run: |
          echo "Esperando Frontend..."
          kubectl rollout status deployment/frontend -n $EKS_NAMESPACE --timeout=300s

          echo "Esperando Ventas..."
          kubectl rollout status deployment/ventas -n $EKS_NAMESPACE --timeout=300s || true

          echo "Esperando Despachos..."
          kubectl rollout status deployment/despachos -n $EKS_NAMESPACE --timeout=300s || true

      # =========================
      # DIAGNÓSTICO
      # =========================

      - name: Ver pods y servicios
        run: |
          echo "=== PODS ==="
          kubectl get pods -n $EKS_NAMESPACE -o wide

          echo ""
          echo "=== SERVICES ==="
          kubectl get svc -n $EKS_NAMESPACE

          echo ""
          echo "=== DEPLOYMENTS ==="
          kubectl get deployments -n $EKS_NAMESPACE