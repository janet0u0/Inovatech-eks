version: "3.8"

services:

  db:
    image: mysql:8
    container_name: mysql-inovatech
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inovatech
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  ventas:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
      dockerfile: Dockerfile
    container_name: ventas
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_ENDPOINT: db
      DB_PORT: 3306
      DB_NAME: inovatech
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - db

  despachos:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      dockerfile: Dockerfile
    container_name: despachos
    restart: always
    ports:
      - "8081:8081"
    environment:
      DB_ENDPOINT: db
      DB_PORT: 3306
      DB_NAME: inovatech
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - db

  frontend:
    build:
      context: ./front_despacho
      dockerfile: Dockerfile
    container_name: frontend
    restart: always
    ports:
      - "80:80"

volumes:
  db_data: