apiVersion: apps/v1
kind: Deployment
metadata:
  name: ventas
  namespace: inovatech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ventas
  template:
    metadata:
      labels:
        app: ventas
    spec:
      containers:
        - name: ventas
          image: <ECR_VENTAS>:latest
          ports:
            - containerPort: 8080

          env:
            - name: DB_ENDPOINT
              value: "mysql"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "inovatech"
            - name: DB_USERNAME
              value: "root"
            - name: DB_PASSWORD
              value: "root"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10