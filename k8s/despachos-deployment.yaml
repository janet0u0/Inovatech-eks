apiVersion: apps/v1
kind: Deployment
metadata:
  name: despachos
  namespace: inovatech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: despachos
  template:
    metadata:
      labels:
        app: despachos
    spec:
      containers:
        - name: despachos
          image: <TU_ECR_DESPACHOS> # aquí va tu imagen de AWS ECR
          ports:
            - containerPort: 8081

          env:
            - name: DB_ENDPOINT
              value: "mysql"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "inovatech"
            - name: DB_USERNAME
              value: "root"
            - name: DB_PASSWORD
              value: "root"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10